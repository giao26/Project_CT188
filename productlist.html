<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/productlist.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header></header>

    <main>
      <section class="hero">
        <div class="hero-img">
          <img
            src="assets/images/productlistimage/product-page-hero-img.jpg"
            alt=""
          />
        </div>
      </section>

      <section class="container action flex">
        <div class="search-box">
          <span>
            <i class="fa-brands fa-sistrix"></i>
          </span>
          <input
            placeholder="Tìm kiếm sản phẩm..."
            type="text"
            class="search"
            title="Tìm kiếm sản phẩm"
            id="search-inp"
          />
        </div>
        <select
          class="filter-category"
          name="category"
          id="filter-category"
          title="bộ lọc"
        ></select>
        <select class="price-sort" id="price-sort" title="Sắp xếp theo giá">
          <option value="default" selected>Giá</option>
          <option value="asc">Thấp-cao</option>
          <option value="desc">Cao-thấp</option>
        </select>
      </section>

      <section class="product">
        <div class="product-grid" id="product-grid"></div>
      </section>
    </main>
    <script src="assets/js/productlist.js"></script>
  </body>
</html>
